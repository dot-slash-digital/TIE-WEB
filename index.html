<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

      name="description"
      content="Two Independent Eyes thrives on unique, impactful narrative storytelling. By challenging the expected, we aim to deliver moments rich with evocative power while carving spaces where stories are experienced in the most profound ways."
    />
    <link rel="stylesheet" href="styles/global.css" />
    <link rel="stylesheet" href="styles/home.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap"

    <!-- Prefetch internal pages -->
    <link rel="prefetch" href="index" />
    <link rel="prefetch" href="about" />
    <link rel="prefetch" href="film-and-tv" />
    <link rel="prefetch" href="immersive" />
    <link rel="prefetch" href="coming-soon" />

    <script src="https://cdn.usefathom.com/script.js" data-site="MWOLHYZD" defer></script>

  <body>
    <div id="blink-overlay"><div id="blink-gradient"></div></div>
    <div id="global-wrap">
      <div id="background-wrap">
        <!-- final srcs pending; trying to create shortest possible seamless loop, then compress -->
        <video id="background-video" playsinline autoplay muted loop>
          <!-- want to have both .mp4 and .webm -->
          <source src="assets/videos/11-frames-x2.mp4" type="video/mp4" />
        </video>
        <img
          id="home-logo"
          src="assets/images/home-logo.webp"
          alt="Two Independent Eyes"
        />
      </div>

      <div id="navigation-wrap">
        <img
          id="logo"
          src="assets/images/logo-dark.webp"
          alt="Two Independent Eyes"
        />
        <nav>
          <div id="nav-column-1" class="nav-column">
            <a href="film-and-tv">I. Film & TV</a>
            <a href="immersive">II. Immersive</a>
            <a href="hospitality">III. Hospitality</a>
          </div>
          <div id="head-desktop-wrap">
            <img
              id="head-desktop"
              class="blend"
              src="assets/images/home-head-no-eye.webp"
              alt=""
            />
            <img
              id="home-head-eye"
              class="blend"
              src="assets/images/home-head-eye.webp"
              alt=""
            />
          </div>
          <img
            id="head-mobile"
            class="blend"
            src="assets/images/home-head-mobile.webp"
            alt=""
          />
          <div id="nav-column-2" class="nav-column">
            <a href="about">IV. About</a>
            <a href="contact">V. Correspondence</a>
          </div>
        </nav>
      </div>

      <div id="attribution">2026 © two independent eyes</div>

      <script src="scripts/eye-blink.js"></script>
      <script src="scripts/home.js"></script>
    </div>
