<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Correspondence | Two Independent Eyes</title>
    <meta
      name="description"
      content="Two Independent Eyes thrives on unique, impactful narrative storytelling. By challenging the expected, we aim to deliver moments rich with evocative power while carving spaces where stories are experienced in the most profound ways."
    />
    <link rel="stylesheet" href="styles/global.css" />
    <link rel="stylesheet" href="styles/contact.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <!-- Prefetch internal pages -->
    <link rel="prefetch" href="index" />
    <link rel="prefetch" href="about" />
    <link rel="prefetch" href="film-and-tv" />
    <link rel="prefetch" href="immersive" />
    <link rel="prefetch" href="coming-soon" />
    <link rel="prefetch" href="contact" />
    <!-- Fathom Analytics -->
    <script src="https://cdn.usefathom.com/script.js" data-site="MWOLHYZD" defer></script>
  </head>
  <body>
    <div id="blink-overlay"><div id="blink-gradient"></div></div>
    <div id="global-wrap">
      <div id="subpage-wrap">
        <img
          id="corner-graphic"
          class="blend"
          src="assets/images/coming-soon-corner-graphic.webp"
          alt=""
        />
        <div id="logo-wrap">
          <a href="./?nav=open">
            <img
              id="logo"
              src="assets/images/logo-dark.webp"
              alt="Two Independent Eyes"
            />
          </a>
          <a id="back-button" href="./?nav=open">Take me back</a>
        </div>

        <form
          id="contact-form"
          action="https://formspree.io/f/xqeojwen"
          method="POST"
        >
          <p id="tagline">Fear no conversation. Say &#8220;hello.&#8221;</p>
          <div class="field">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="first-name" />
          </div>
          <div class="field">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="last-name" />
          </div>
          <div class="field">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="field">
            <label for="message">Message *</label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <p id="form-status" role="status" aria-live="polite"></p>
          <button type="submit">Submit Query</button>
        </form>
      </div>
      <script src="scripts/eye-blink.js"></script>
      <script src="scripts/contact.js" type="module"></script>
    </div>
  </body>
</html>
